name: Backend CI

on:
  push:
    paths:
      - 'server/**'
      - '.github/workflows/backend-tests.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/backend-tests.yml'

permissions:
  contents: read

jobs:
  backend-checks:
    name: Typecheck, tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    env:
      # Нужен только для генерации Prisma Client.
      # Подключение к этой базе выполняться не будет.
      DATABASE_URL: postgresql://test:test@localhost:5432/studyvault_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Typecheck backend
        run: npm run typecheck

      - name: Typecheck tests
        run: npm run test:typecheck

      - name: Run API tests
        run: npm test

      - name: Build backend
        run: npm run build